<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="3" fill="#0d0d0d"/>

  <!-- Cybertruck body silhouette (side profile) -->
  <polygon
    points="2,26 2,17 6,10 20,8 23,13 30,13 30,26"
    fill="#00d4ff"
    opacity="0.9"/>

  <!-- Wheel arch cutouts -->
  <circle cx="8"  cy="26" r="5" fill="#0d0d0d"/>
  <circle cx="25" cy="26" r="5" fill="#0d0d0d"/>

  <!-- Tires -->
  <circle cx="8"  cy="26" r="4"   fill="#1a1a1a" stroke="#00d4ff" stroke-width="1"/>
  <circle cx="25" cy="26" r="4"   fill="#1a1a1a" stroke="#00d4ff" stroke-width="1"/>

  <!-- Wheel rims -->
  <circle cx="8"  cy="26" r="1.5" fill="#00d4ff"/>
  <circle cx="25" cy="26" r="1.5" fill="#00d4ff"/>

  <!-- Windshield detail line -->
  <line x1="6" y1="10" x2="20" y2="8" stroke="#0d0d0d" stroke-width="1" opacity="0.5"/>
</svg>
